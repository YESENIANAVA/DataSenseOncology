<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-xl text-center w-96">
        <h2 class="text-2xl font-bold mb-2 text-gray-800">Crear Nueva Contraseña</h2>
        <p class="text-sm text-gray-500 mb-6">Hola, <span class="font-bold text-gray-700">{{ user }}</span>. Tu identidad ha sido verificada.</p>
        
        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form action="/guardar_nueva_contrasena" method="POST">
            <input type="hidden" name="user" value="{{ user }}">
            
            <div class="mb-4 text-left">
                <label class="block text-gray-700 text-sm font-bold mb-2">Nueva Contraseña</label>
                <input type="password" name="password" required class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-gray-400">
            </div>

            <div class="mb-6 text-left">
                <label class="block text-gray-700 text-sm font-bold mb-2">Confirmar Contraseña</label>
                <input type="password" name="confirm_password" required class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-gray-400">
            </div>

            <button type="submit" class="w-full bg-gray-800 text-white font-bold py-2 rounded hover:bg-gray-700 transition">
                Actualizar y Entrar
            </button>
        </form>
    </div>

</body>
</html>
